name: Inflation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # roda todo dia às 03:00 UTC

jobs:
  run-pipelines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Selic Over pipeline
        run: python -m src.pipelines.selic_over

      - name: Run Selic Meta pipeline
        run: python -m src.pipelines.selic_meta

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/*.csv
